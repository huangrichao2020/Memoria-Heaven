name = "memoria-heaven-api"
main = "src/index.js"
compatibility_date = "2024-12-01"

# D1 数据库
[[d1_databases]]
binding = "DB"
database_name = "memoria-heaven-db"
database_id = "YOUR_D1_DATABASE_ID"  # 部署时替换

# R2 存储桶
[[r2_buckets]]
binding = "STORAGE"
bucket_name = "memoria-heaven-data"

# KV 缓存
[[kv_namespaces]]
binding = "CACHE"
id = "YOUR_KV_NAMESPACE_ID"  # 部署时替换

# 环境变量（敏感信息用 wrangler secret 设置）
[vars]
GROQ_BASE_URL = "https://api.groq.com/openai/v1"
ALLOWED_ORIGINS = "https://memoria-heaven.pages.dev,http://localhost:5173"
